services:
  db:
    image: postgres:16-alpine
    container_name: gestao-aluguel-db
    environment:
      POSTGRES_DB: gestao_aluguel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gestao_aluguel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gestao-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestao-aluguel-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gestao_aluguel
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_FRONTEND_URL: http://localhost:3000
      APP_JWT_SECRET: change-me-super-secret-key-at-least-64-characters-long-please-change
      # SMTP (ajuste conforme necessário)
      SPRING_MAIL_HOST: smtp.example.com
      SPRING_MAIL_PORT: "587"
      SPRING_MAIL_USERNAME: seu-usuario-smtp
      SPRING_MAIL_PASSWORD: sua-senha-smtp
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - gestao-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL do backend acessível pelo browser (host) — deve casar com BACKEND_PORT
        NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-8080}
    container_name: gestao-aluguel-frontend
    depends_on:
      - backend
    ports:
      # 3000 no host costuma estar ocupado (ex.: Grafana); default 3001
      - "${FRONTEND_PORT:-3001}:3000"
    networks:
      - gestao-net

volumes:
  db_data:

networks:
  gestao-net:
    driver: bridge
