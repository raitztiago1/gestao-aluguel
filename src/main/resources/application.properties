# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/gestao_aluguel
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway (migration scripts under classpath:db/migration)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Server
server.port=8080

# JWT Configuration
app.jwt.secret=change-me-super-secret-key-at-least-64-characters-long-please-change
app.jwt.expiration=86400000

# Email configuration
app.email.from=no-reply@gestao-aluguel.local
app.frontend.url=http://localhost:3000
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=seu-usuario-smtp
spring.mail.password=sua-senha-smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Password policy
app.password.min-length=8
app.password.max-length=255

# Rate limiting
app.rate-limit.max-attempts=5
app.rate-limit.lock-duration-minutes=15

# Logging
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

spring.application.name=gestao-aluguel
