# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/gestao_aluguel
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# spring.jackson.serialization.write-dates-as-timestamps=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway (migration scripts under classpath:db/migration)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Server
server.port=8080

# JWT Configuration
app.jwt.secret=your-super-secret-key-change-in-production-environment-this-is-not-secure
app.jwt.expiration=86400000

# Logging
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

# Management
# management.endpoints.web.exposure.include=health,info
spring.application.name=gestao-aluguel
